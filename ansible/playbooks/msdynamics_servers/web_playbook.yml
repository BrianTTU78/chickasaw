###################################
# FIREWALL TASKS START
###################################

- name: Determine if this host runs SSRS / Reporting Extensions
  ansible.builtin.set_fact:
    is_ssrs_host: >-
      {{
        (env | lower in ['dev', 'test'] and ansible_hostname | lower is search('app01')) or
        (env | lower in ['stage', 'prod'] and ansible_hostname | lower is search('app03'))
      }}

- name: Check and configure required CRM firewall rules
  block:

    # -------------------------------------------------------
    # PORT 80 (TCP) — HTTP redirect
    # -------------------------------------------------------
    - name: Check if firewall rule exists for port 80 (TCP)
      ansible.windows.win_shell: |
        $rule = Get-NetFirewallPortFilter -Protocol TCP | Where-Object {
          $_.LocalPort -eq "80"
        } | Get-NetFirewallRule | Where-Object {
          $_.Direction -eq "Inbound" -and $_.Enabled -eq "True"
        }
        if ($rule) { Write-Output "RULE_FOUND" } else { Write-Output "RULE_NOT_FOUND" }
      register: fw_80
      changed_when: false

    - name: Notify — firewall rule for port 80 (TCP) already exists
      ansible.builtin.debug:
        msg: "NOTICE: An inbound firewall rule for port 80 (TCP) already exists on {{ ansible_hostname }} — skipping"
      when: "'RULE_FOUND' in fw_80.stdout_lines"

    - name: Create firewall rule for port 80 (TCP) — HTTP redirect
      community.windows.win_firewall_rule:
        name: "CRM - HTTP 80 (TCP)"
        localport: "80"
        action: allow
        direction: in
        protocol: tcp
        state: present
        enabled: yes
      when: "'RULE_NOT_FOUND' in fw_80.stdout_lines"

    # -------------------------------------------------------
    # PORT 135 (TCP) — RPC endpoint resolution
    # -------------------------------------------------------
    - name: Check if firewall rule exists for port 135 (TCP)
      ansible.windows.win_shell: |
        $rule = Get-NetFirewallPortFilter -Protocol TCP | Where-Object {
          $_.LocalPort -eq "135"
        } | Get-NetFirewallRule | Where-Object {
          $_.Direction -eq "Inbound" -and $_.Enabled -eq "True"
        }
        if ($rule) { Write-Output "RULE_FOUND" } else { Write-Output "RULE_NOT_FOUND" }
      register: fw_135
      changed_when: false

    - name: Notify — firewall rule for port 135 (TCP) already exists
      ansible.builtin.debug:
        msg: "NOTICE: An inbound firewall rule for port 135 (TCP) already exists on {{ ansible_hostname }} — skipping"
      when: "'RULE_FOUND' in fw_135.stdout_lines"

    - name: Create firewall rule for port 135 (TCP) — RPC endpoint resolution
      community.windows.win_firewall_rule:
        name: "CRM - RPC 135 (TCP)"
        localport: "135"
        action: allow
        direction: in
        protocol: tcp
        state: present
        enabled: yes
      when: "'RULE_NOT_FOUND' in fw_135.stdout_lines"

    # -------------------------------------------------------
    # PORT 139 (TCP) — NETBIOS session service
    # -------------------------------------------------------
    - name: Check if firewall rule exists for port 139 (TCP)
      ansible.windows.win_shell: |
        $rule = Get-NetFirewallPortFilter -Protocol TCP | Where-Object {
          $_.LocalPort -eq "139"
        } | Get-NetFirewallRule | Where-Object {
          $_.Direction -eq "Inbound" -and $_.Enabled -eq "True"
        }
        if ($rule) { Write-Output "RULE_FOUND" } else { Write-Output "RULE_NOT_FOUND" }
      register: fw_139
      changed_when: false

    - name: Notify — firewall rule for port 139 (TCP) already exists
      ansible.builtin.debug:
        msg: "NOTICE: An inbound firewall rule for port 139 (TCP) already exists on {{ ansible_hostname }} — skipping"
      when: "'RULE_FOUND' in fw_139.stdout_lines"

    - name: Create firewall rule for port 139 (TCP) — NETBIOS session service
      community.windows.win_firewall_rule:
        name: "CRM - NETBIOS Session 139 (TCP)"
        localport: "139"
        action: allow
        direction: in
        protocol: tcp
        state: present
        enabled: yes
      when: "'RULE_NOT_FOUND' in fw_139.stdout_lines"

    # -------------------------------------------------------
    # PORT 443 (TCP) — CRM web traffic, IFD, AD FS
    # -------------------------------------------------------
    - name: Check if firewall rule exists for port 443 (TCP)
      ansible.windows.win_shell: |
        $rule = Get-NetFirewallPortFilter -Protocol TCP | Where-Object {
          $_.LocalPort -eq "443"
        } | Get-NetFirewallRule | Where-Object {
          $_.Direction -eq "Inbound" -and $_.Enabled -eq "True"
        }
        if ($rule) { Write-Output "RULE_FOUND" } else { Write-Output "RULE_NOT_FOUND" }
      register: fw_443
      changed_when: false

    - name: Notify — firewall rule for port 443 (TCP) already exists
      ansible.builtin.debug:
        msg: "NOTICE: An inbound firewall rule for port 443 (TCP) already exists on {{ ansible_hostname }} — skipping"
      when: "'RULE_FOUND' in fw_443.stdout_lines"

    - name: Create firewall rule for port 443 (TCP) — CRM web traffic, IFD, AD FS
      community.windows.win_firewall_rule:
        name: "CRM - HTTPS 443 (TCP)"
        localport: "443"
        action: allow
        direction: in
        protocol: tcp
        state: present
        enabled: yes
      when: "'RULE_NOT_FOUND' in fw_443.stdout_lines"

    # -------------------------------------------------------
    # PORT 445 (TCP) — Microsoft-DS / Active Directory / SMB
    # -------------------------------------------------------
    - name: Check if firewall rule exists for port 445 (TCP)
      ansible.windows.win_shell: |
        $rule = Get-NetFirewallPortFilter -Protocol TCP | Where-Object {
          $_.LocalPort -eq "445"
        } | Get-NetFirewallRule | Where-Object {
          $_.Direction -eq "Inbound" -and $_.Enabled -eq "True"
        }
        if ($rule) { Write-Output "RULE_FOUND" } else { Write-Output "RULE_NOT_FOUND" }
      register: fw_445_tcp
      changed_when: false

    - name: Notify — firewall rule for port 445 (TCP) already exists
      ansible.builtin.debug:
        msg: "NOTICE: An inbound firewall rule for port 445 (TCP) already exists on {{ ansible_hostname }} — skipping"
      when: "'RULE_FOUND' in fw_445_tcp.stdout_lines"

    - name: Create firewall rule for port 445 (TCP) — Microsoft-DS / Active Directory / SMB
      community.windows.win_firewall_rule:
        name: "CRM - Microsoft-DS 445 (TCP)"
        localport: "445"
        action: allow
        direction: in
        protocol: tcp
        state: present
        enabled: yes
      when: "'RULE_NOT_FOUND' in fw_445_tcp.stdout_lines"

    # -------------------------------------------------------
    # PORT 808 (TCP) — Windows Process Activation (WAS)
    # -------------------------------------------------------
    - name: Check if firewall rule exists for port 808 (TCP)
      ansible.windows.win_shell: |
        $rule = Get-NetFirewallPortFilter -Protocol TCP | Where-Object {
          $_.LocalPort -eq "808"
        } | Get-NetFirewallRule | Where-Object {
          $_.Direction -eq "Inbound" -and $_.Enabled -eq "True"
        }
        if ($rule) { Write-Output "RULE_FOUND" } else { Write-Output "RULE_NOT_FOUND" }
      register: fw_808
      changed_when: false

    - name: Notify — firewall rule for port 808 (TCP) already exists
