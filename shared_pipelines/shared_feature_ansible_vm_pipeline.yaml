parameters:
  - name: playbook_folder
    type: string

variables:
  - group: cn_pipelines_common

stages:
- stage: Dev_Validation

  pool:
    name: ADA-ECS-DEV

  jobs:
  - job: AnsibleFeatureJob
    displayName: Ansible Feature Execution Testing
    condition: or(or(startsWith(variables['Build.SourceBranch'], 'refs/heads/feature/'), startsWith(variables['Build.SourceBranch'], 'refs/heads/bug/')), eq(variables['Build.Reason'], 'PullRequest'))

    steps:
    - checkout: self

    # Feature Branch Testing
    - task: Bash@3
      displayName: Validate Ansible Playbook
      inputs:
        targetType: 'inline'
        workingDirectory: "$(Build.SourcesDirectory)/playbooks/${{parameters.playbook_folder}}"
        script: |
          ls -l
          ansible-playbook playbook.yml -e "@../../group_vars/dev.yml"  -e "ADO_PAT=$ADO_PAT" -e "DYNATRACE_PAAS_TOKEN=$DYNATRACE_PAAS_TOKEN" -i ../../inventories/dev -C -D
        failOnStderr: false