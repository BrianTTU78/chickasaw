# mongod.conf

# for documentation of all options, see:
#   http://docs.mongodb.org/manual/reference/configuration-options/

systemLog:
  destination: file
  path: /data01/mongodb/logs/mongod.log
  logAppend: true
  component:
    accessControl:
      verbosity: 0
    command:
      verbosity: 0
    network:
      verbosity: 0
    storage:
      verbosity: 0
    sharding:
      verbosity: 0

storage:
  dbPath: /data01/mongodb/data

net:
  bindIp: 127.0.0.1
  port: 27017

security:
  authorization: "enabled"

processManagement:
  timeZoneInfo: /usr/share/zoneinfo
  fork: true  # Run as a background process (daemonize)
