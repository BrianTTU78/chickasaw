replicaCount: 1

image:
  repository: dbafromthecold/pac-man
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

containerPort: 80

serviceAccount:
  create: true

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: adavdevk8s01.int.chickasaw.net
      paths:
        - path: /
          pathType: Prefix
  tls: []
