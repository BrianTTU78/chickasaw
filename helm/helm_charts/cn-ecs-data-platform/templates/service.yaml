apiVersion: v1
kind: Service
metadata:
  name: {{ include "cn-ecs-data-platform.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "cn-ecs-data-platform.name" . }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
