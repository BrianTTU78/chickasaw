apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: formio-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: ssh://azdevops.int.chickasaw.net:22/Tribal%20Services/Enhanced%20Citizen%20Services/_git/cn_ecs_helm_charts
    targetRevision: main
    path: helm_charts/formio-app
    helm:
      valueFiles:
        - prod-ext-values.yaml
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: formio-app

  syncPolicy:
    syncOptions:
      - CreateNamespace=true