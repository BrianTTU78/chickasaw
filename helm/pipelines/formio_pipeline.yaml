name: ECS_$(Build.DefinitionName)_$(SourceBranchName)_$(Date:yyyyMMdd).$(Rev:r)

trigger:
  branches:
    include:
      - main
      - bug/*

  paths:
    include:
      - helm_charts/formio/*
 
variables:
  - group: cn_pipelines_common
  - group: cn-ecs-formio-app_dev

resources:
  repositories:
    - repository: shared_pipelines
      type: git
      name: cn_ecs_shared_pipelines

    - repository: helm_charts
      type: git
      name: cn_ecs_helm_charts
 
extends:
  template: shared_main_formio_pipeline.yaml@shared_pipelines
  parameters:
    app_name: formio-app
    app_type: formio
    app_location: external
