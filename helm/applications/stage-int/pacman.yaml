apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pacman-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: ssh://azdevops.int.chickasaw.net:22/Tribal%20Services/Enhanced%20Citizen%20Services/_git/cn_ecs_helm_charts
    targetRevision: refs/heads/main
    path: helm_charts/pacman
    helm:
      releaseName: pacman
      
  destination:
    server: https://kubernetes.default.svc
    namespace: pacman
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
