# ADD / VERIFY USER EXIST IN LOG ON GROUP
- name: Allow service accounts to log on as a service
  ansible.windows.win_user_right:
    name: SeServiceLogonRight
    users:
      - 'INT\DYN_AS_{{ short_env | upper }}'
      - 'INT\DYN_ASYN_{{ short_env | upper }}'
      - 'INT\DYN_DWS_{{ short_env | upper }}'
      - 'INT\DYN_VSS_{{ short_env | upper }}'
      - 'INT\DYN_SB_{{ short_env | upper }}'
      - 'INT\DYN_MS_{{ short_env | upper }}'
      - 'INT\DYN_SU_{{ short_env | upper }}'
      - 'INT\DYN_SSRS_{{ short_env | upper }}'
    action: add

# INSTALL SRSS SERVER ON APP SERVER
- name: Install SSRS server on app server
  ansible.windows.win_package:
    path: 'D:\Dyn365\SQLServerReportingServices2022.exe'
    arguments:
      - /quiet
      - /norestart
      - /PID={{ d365_sql_product_key }}
      - /IAcceptLicenseTerms
      - '/InstallFolder=D:\Program Files\Microsoft SQL Server Reporting Services'
    state: present
    creates_service: SQLServerReportingServices
  when: >-
    (env | lower in ['dev', 'test'] and ansible_hostname | lower is search('app01')) or
    (env | lower in ['stage', 'prod'] and ansible_hostname | lower is search('app03'))

# CHECK IF ISO IS ALREADY MOUNTED
- name: Check if ISO is mounted
  ansible.windows.win_powershell:
    script: |
      $img = Get-DiskImage -ImagePath "D:\Dyn365\Dyn_365_9.0.ISO" -ErrorAction SilentlyContinue
      if ($img -and $img.Attached) {
        ($img | Get-Volume).DriveLetter
      }
  register: iso_drive
  changed_when: false

# MOUNT ONLY IF NOT MOUNTED
- name: Mount ISO
  ansible.windows.win_powershell:
    script: |
      $disk = Mount-DiskImage -ImagePath "D:\Dyn365\Dyn_365_9.0.ISO" -PassThru
      ($disk | Get-Volume).DriveLetter
  register: iso_mount
  when: iso_drive.output is not defined or (iso_drive.output | length == 0)

# SET FACT FOR LATER USE
- name: Set ISO drive letter
  ansible.builtin.set_fact:
    iso_drive_letter: >-
      {{
        (
          iso_mount.output[0]
          if (
            iso_mount is defined and
            iso_mount.output is defined and
            (iso_mount.output | length > 0)
          )
          else
          iso_drive.output[0]
        ) | trim
      }}

# PRINT DRIVE LETTER
- name: Print ISO drive letter
  ansible.builtin.debug:
    msg: "ISO drive letter is {{ iso_drive_letter }}"
    
###################################
# CERTIFICATE TASKS START
###################################

- name: Determine if this host should receive the SSRS certificate
  ansible.builtin.set_fact:
    install_ssrs_cert: >-
      {{
        (env | lower in ['dev', 'test'] and ansible_hostname | lower is search('app01')) or
        (env | lower in ['stage', 'prod'] and ansible_hostname | lower is search('app03'))
      }}

- name: Determine if SSRS cert is shared or individual
  ansible.builtin.set_fact:
    ssrs_cert_shared: "{{ env | lower in ['stage', 'prod'] }}"

- name: Ensure D:\Dyn365\cert directory exists
  ansible.windows.win_file:
    path: "D:\\Dyn365\\cert"
    state: directory
  when: install_ssrs_cert | bool

- name: Check if SSRS certificate already exists in local machine store
  ansible.windows.win_shell: |
    $cert = Get-ChildItem Cert:\LocalMachine\My | Where-Object {
      $_.Subject -eq "CN={{ env }}-ecsssrs" -and
      $_.NotAfter -gt (Get-Date)
    }
    if ($cert -and $cert.Count -gt 0) {
      Write-Output "CERT_FOUND"
    } else {
      Write-Output "CERT_NOT_FOUND"
    }
  register: ssrs_cert_check
  changed_when: false
  when: install_ssrs_cert | bool

- name: Notify — valid SSRS certificate already exists, skipping import
  ansible.builtin.debug:
    msg: "NOTICE: A valid SSRS certificate (CN={{ env }}-ecsssrs) already exists on {{ ansible_hostname }} — files will be copied but import will be skipped"
  when:
    - install_ssrs_cert | bool
    - ssrs_cert_check.stdout_lines is defined
    - "'CERT_FOUND' in ssrs_cert_check.stdout_lines"

# -------------------------------------------------------
# INDIVIDUAL CERT (dev/test)
# -------------------------------------------------------
- name: Fetch, copy and import SSRS certificate (individual)
  when:
    - install_ssrs_cert | bool
    - not ssrs_cert_shared | bool
  block:
    - name: Fetch SSRS .pfx from artifactory (individual)
      ansible.builtin.fetch:
        src: "/data01/files/d365/certs/{{ env }}/{{ ansible_hostname }}/ssrs/{{ env }}-ssrs-{{ ansible_hostname | lower }}.pfx"
        dest: "/tmp/{{ env }}-ssrs-{{ ansible_hostname | lower }}.pfx"
        flat: yes
      delegate_to: "{{ artifactory_host }}"

    - name: Copy SSRS .pfx to D:\Dyn365\cert (individual)
      ansible.windows.win_copy:
        src: "/tmp/{{ env }}-ssrs-{{ ansible_hostname | lower }}.pfx"
        dest: "D:\\Dyn365\\cert\\{{ env }}-ssrs-{{ ansible_hostname | lower }}.pfx"

    - name: Import SSRS PFX into LocalMachine\My certificate store (individual)
      ansible.windows.win_shell: |
        Import-PfxCertificate `
          -FilePath "D:\Dyn365\cert\{{ env }}-ssrs-{{ ansible_hostname | lower }}.pfx" `
          -CertStoreLocation Cert:\LocalMachine\My `
          -Exportable
      when:
        - ssrs_cert_check.stdout_lines is defined
        - "'CERT_NOT_FOUND' in ssrs_cert_check.stdout_lines"

# -------------------------------------------------------
# SHARED CERT (stage/prod)
# -------------------------------------------------------
- name: Fetch, copy and import SSRS certificate (shared)
  when:
    - install_ssrs_cert | bool
    - ssrs_cert_shared | bool
  block:
    - name: Fetch SSRS .pfx from artifactory (shared)
      ansible.builtin.fetch:
        src: "/data01/files/d365/certs/{{ env }}/shared/ssrs/{{ env }}-ssrs-shared.pfx"
        dest: "/tmp/{{ env }}-ssrs-shared.pfx"
        flat: yes
      delegate_to: "{{ artifactory_host }}"

    - name: Copy SSRS .pfx to D:\Dyn365\cert (shared)
      ansible.windows.win_copy:
        src: "/tmp/{{ env }}-ssrs-shared.pfx"
        dest: "D:\\Dyn365\\cert\\{{ env }}-ssrs-shared.pfx"

    - name: Import SSRS PFX into LocalMachine\My certificate store (shared)
      ansible.windows.win_shell: |
        Import-PfxCertificate `
          -FilePath "D:\Dyn365\cert\{{ env }}-ssrs-shared.pfx" `
          -CertStoreLocation Cert:\LocalMachine\My `
          -Exportable
      when:
        - ssrs_cert_check.stdout_lines is defined
        - "'CERT_NOT_FOUND' in ssrs_cert_check.stdout_lines"

- name: Skip SSRS certificate — host does not meet criteria
  ansible.builtin.debug:
    msg: "Skipping SSRS cert — {{ ansible_hostname }} does not match targeting criteria for env '{{ env }}'"
  when: not install_ssrs_cert | bool

