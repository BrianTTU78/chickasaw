# DEFINE FEATURE LIST ONCE
- name: Define IIS feature list
  ansible.builtin.set_fact:
    iis_feature_list:
      - NET-Framework-45-Core
      - NET-Framework-45-ASPNET
      - Web-Server
      - Web-Static-Content
      - Web-Default-Doc
      - Web-Dir-Browsing
      - Web-Http-Errors
      - Web-App-Dev
      - Web-Asp-Net45
      - Web-ISAPI-Ext
      - Web-ISAPI-Filter
      - Web-Health
      - Web-Http-Logging
      - Web-Log-Libraries
      - Web-Request-Monitor
      - Web-Http-Tracing
      - Web-Security
      - Web-Basic-Auth
      - Web-Windows-Auth
      - Web-Filtering
      - Web-Digest-Auth
      - Web-Performance
      - Web-Stat-Compression
      - Web-Dyn-Compression
      - Web-Mgmt-Tools
      - Web-Mgmt-Console
      - Web-Mgmt-Compat
      - Web-Metabase
      - WAS
      - WAS-Process-Model
      - Web-Lgcy-Scripting
      - Windows-Identity-Foundation
      - Server-Media-Foundation
      - Xps-Viewer
      - RSAT-Role-Tools
      - RSAT-AD-Tools
      - RSAT-AD-PowerShell
      - RSAT-ADDS
      - RSAT-AD-AdminCenter
      - RSAT-ADDS-Tools
      - RSAT-ADLDS
      - WAS-Config-APIs

# CHECK IF ANY REQUESTED FEATURE IS MISSING
- name: Check whether IIS feature install is needed
  ansible.windows.win_powershell:
    script: |
      $features = @(
        {{ iis_feature_list | map('regex_replace', '^(.*)$', "'\1'") | join(", ") }}
      )

      $missing = Get-WindowsFeature |
        Where-Object { $_.Name -in $features -and $_.InstallState -ne 'Installed' } |
        Select-Object -ExpandProperty Name

      $missing
  register: missing_iis_features
  changed_when: false

# CREATE MISSING FEATURES LIST
- name: Set IIS install needed flag
  ansible.builtin.set_fact:
    iis_features_needed: "{{ missing_iis_features.output | default([]) | length > 0 }}"

# INSTALL MISSING FEATURES
- name: Install IIS features only when needed
  when: iis_features_needed
  block:
    # DISABLE WSUS
    - name: Disable WSUS temporarily
      ansible.windows.win_regedit:
        path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU
        name: UseWUServer
        data: 0
        type: dword

    # RESTART WINDOWS UPDATE
    - name: Restart Windows Update service
      ansible.windows.win_service:
        name: wuauserv
        state: restarted

    # INSTALL TASK
    - name: Install IIS Web Server and Common HTTP Features
      ansible.windows.win_feature:
        name: "{{ iis_feature_list }}"
        state: present
        include_management_tools: true
      register: feature_install
      retries: 3
      delay: 30
      until: feature_install is succeeded

  always:
    # ENABLE WSUS IF FEATURE INSTALLED
    - name: Re-enable WSUS
      ansible.windows.win_regedit:
        path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU
        name: UseWUServer
        data: 1
        type: dword
      when: iis_features_needed

    # RESTART WINDOWS UPDATE
    - name: Restart Windows Update service again
      ansible.windows.win_service:
        name: wuauserv
        state: restarted
      when: iis_features_needed


