# REPO: cn_ecs_ansible
# PIPELINE: pipelines/mongodb_ansible_pipeline.yaml
name: ECS_$(Build.DefinitionName)_$(SourceBranchName)_$(Date:yyyyMMdd).$(Rev:r)

trigger:
  branches:
    include:
      - main

  paths:
    include:
      - playbooks/mongodb_servers/**
      - files/mongodb/**

resources:
  repositories:
    - repository: shared_pipelines
      type: git
      name: cn_ecs_shared_pipelines

extends:
  template: shared_main_ansible_vm_pipeline.yaml@shared_pipelines
  parameters:
    playbook_folder: mongodb_servers
    deploy_dev: yes
    deploy_test: yes
    deploy_stage: yes
    deploy_prod: yes
