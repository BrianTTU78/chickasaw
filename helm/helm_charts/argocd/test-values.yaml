argo-cd:
  configs:
    params:
      "server.insecure": "true"

    cm:
      accounts.ado_pipelines: apiKey
      accounts.ado_pipelines.enabled: "true"
      oidc.tls.insecure.skip.verify: "true"
      url: https://test-ecs-argocd.int.chickasaw.net
      oidc.config: |
        name: SSO
        issuer: https://login.microsoftonline.com/f29a0ed1-9753-4fea-85e9-df336a63c5d8/v2.0
        clientID: 39120438-d19d-418b-a979-abd1056dec5c
        clientSecret: $oidc.clientSecret
        requestedScopes: ["openid", "profile", "email"]

    rbac:
      policy.default: role:readonly
      scopes: '[groups, email]'
      policy.csv: |
        p, role:pipeline-sync, applications, get, */*, allow
        p, role:pipeline-sync, applications, sync, */*, allow
        p, role:developer, applications, get, */*, allow
        p, role:developer, applications, sync, */*, allow
        p, role:developer, logs, get, */*, allow
        
        g, 8eb32278-ff77-4ea2-a1e3-23ff46e1c2dd, role:admin
        g, Brian.Dickey@chickasaw.net, role:admin
        g, George.Gavula@chickasaw.net, role:admin
        g, Charles.Webb@chickasaw.net, role:admin
        g, Stephanie.Marcoli@chickasaw.net, role:readonly
        g, Alejandro.Ramirez@chickasaw.net, role:developer
        g, ado_pipelines, role:pipeline-sync

  server:
    ingress:
      enabled: true
      ingressClassName: nginx
      hostname: test-ecs-argocd.int.chickasaw.net
      path: /
      pathType: Prefix
      annotations:
        nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
        nginx.ingress.kubernetes.io/ssl-redirect: "false"