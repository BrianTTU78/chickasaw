---
# SETUP BASE DOMAIN KEY
- name: Create base domain key
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\CurrentVersion\Internet Settings\ZoneMap\Domains\chickasaw.net
    state: present

# SETUP INT SUBDOMAIN KEY
- name: Create int subdomain key
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\CurrentVersion\Internet Settings\ZoneMap\Domains\chickasaw.net\int
    state: present

# CREATE ECSSSRS SUBDOMAIN
- name: Create host subdomain key
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\CurrentVersion\Internet Settings\ZoneMap\Domains\chickasaw.net\int\{{ env | lower }}-ecsssrs
    state: present

# CREATE MYECS SUBDOMAIN
- name: Create host subdomain key
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\CurrentVersion\Internet Settings\ZoneMap\Domains\chickasaw.net\int\{{ env | lower }}-myecs
    state: present

# ADDING TO TRUSTED SITES
- name: Add HTTPS site to Trusted Sites zone
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\CurrentVersion\Internet Settings\ZoneMap\Domains\chickasaw.net\int\{{ env | lower }}-ecsssrs
    name: https
    data: 2
    type: dword
    state: present

# ADDING TO TRUSTED SITES
- name: Add HTTPS site to Trusted Sites zone
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\CurrentVersion\Internet Settings\ZoneMap\Domains\chickasaw.net\int\{{ env | lower }}-myecs
    name: https
    data: 2
    type: dword
    state: present

# ENFORCE TRUSTED SITE POLICY ALL USERS
- name: Enforce Trusted Sites logon to automatic with current username and password
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\CurrentVersion\Internet Settings\Zones\2
    name: 1A00
    data: 0
    type: dword
    state: present