###################################
# CERTIFICATE TASKS START
###################################

# CERT TARGETING (WEB)
- name: Determine if this host should receive the MyECS certificate
  ansible.builtin.set_fact:
    install_myecs_cert: >-
      {{
        ansible_hostname | lower is search('dynweb') or
        ansible_hostname | lower is search('dwb') or
        ansible_hostname | lower is search('web')
      }}

- name: Determine if MyECS cert is shared or individual
  ansible.builtin.set_fact:
    myecs_cert_shared: "{{ env | lower in ['stage', 'prod'] }}"

- name: Ensure D:\Dyn365\cert directory exists
  ansible.windows.win_file:
    path: "D:\\Dyn365\\cert"
    state: directory
  when: install_myecs_cert | bool

- name: Check if MyECS certificate already exists in local machine store
  ansible.windows.win_shell: |
    $cert = Get-ChildItem Cert:\LocalMachine\My | Where-Object {
      $_.Subject -eq "CN={{ env }}-myecs.int.chickasaw.net" -and
      $_.NotAfter -gt (Get-Date)
    }
    if ($cert -and $cert.Count -gt 0) {
      Write-Output "CERT_FOUND"
    } else {
      Write-Output "CERT_NOT_FOUND"
    }
  register: myecs_cert_check
  changed_when: false
  when: install_myecs_cert | bool

- name: Notify — valid MyECS certificate already exists, skipping import
  ansible.builtin.debug:
    msg: "NOTICE: A valid MyECS certificate (CN={{ env }}-myecs.int.chickasaw.net) already exists on {{ ansible_hostname }} — files will be copied but import will be skipped"
  when:
    - install_myecs_cert | bool
    - myecs_cert_check.stdout_lines is defined
    - "'CERT_FOUND' in myecs_cert_check.stdout_lines"

# -------------------------------------------------------
# INDIVIDUAL CERT (dev/test)
# src: /data01/files/d365/certs/{env}/{SERVER}/myecs/{env}-myecs-{server}.pfx
# -------------------------------------------------------
- name: Fetch, copy and import MyECS certificate (individual)
  when:
    - install_myecs_cert | bool
    - not myecs_cert_shared | bool
  block:
    - name: Fetch MyECS .pfx from artifactory (individual)
      ansible.builtin.fetch:
        src: "/data01/files/d365/certs/{{ env }}/{{ ansible_hostname }}/myecs/{{ env }}-myecs-{{ ansible_hostname | lower }}.pfx"
        dest: "/tmp/{{ env }}-myecs-{{ ansible_hostname | lower }}.pfx"
        flat: yes
      delegate_to: "{{ artifactory_host }}"

    - name: Copy MyECS .pfx to D:\Dyn365\cert (individual)
      ansible.windows.win_copy:
        src: "/tmp/{{ env }}-myecs-{{ ansible_hostname | lower }}.pfx"
        dest: "D:\\Dyn365\\cert\\{{ env }}-myecs-{{ ansible_hostname | lower }}.pfx"

    - name: Import MyECS PFX into LocalMachine\My certificate store (individual)
      ansible.windows.win_shell: |
        Import-PfxCertificate `
          -FilePath "D:\Dyn365\cert\{{ env }}-myecs-{{ ansible_hostname | lower }}.pfx" `
          -CertStoreLocation Cert:\LocalMachine\My `
          -Exportable
      when:
        - myecs_cert_check.stdout_lines is defined
        - "'CERT_NOT_FOUND' in myecs_cert_check.stdout_lines"

# -------------------------------------------------------
# SHARED CERT (stage/prod)
# src: /data01/files/d365/certs/{env}/shared/myecs/{env}-myecs-shared.pfx
# -------------------------------------------------------
- name: Fetch, copy and import MyECS certificate (shared)
  when:
    - install_myecs_cert | bool
    - myecs_cert_shared | bool
  block:
    - name: Fetch MyECS .pfx from artifactory (shared)
      ansible.builtin.fetch:
        src: "/data01/files/d365/certs/{{ env }}/shared/myecs/{{ env }}-myecs-shared.pfx"
        dest: "/tmp/{{ env }}-myecs-shared.pfx"
        flat: yes
      delegate_to: "{{ artifactory_host }}"

    - name: Copy MyECS .pfx to D:\Dyn365\cert (shared)
      ansible.windows.win_copy:
        src: "/tmp/{{ env }}-myecs-shared.pfx"
        dest: "D:\\Dyn365\\cert\\{{ env }}-myecs-shared.pfx"

    - name: Import MyECS PFX into LocalMachine\My certificate store (shared)
      ansible.windows.win_shell: |
        Import-PfxCertificate `
          -FilePath "D:\Dyn365\cert\{{ env }}-myecs-shared.pfx" `
          -CertStoreLocation Cert:\LocalMachine\My `
          -Exportable
      when:
        - myecs_cert_check.stdout_lines is defined
        - "'CERT_NOT_FOUND' in myecs_cert_check.stdout_lines"

- name: Skip MyECS certificate — host does not meet criteria
  ansible.builtin.debug:
    msg: "Skipping MyECS cert — {{ ansible_hostname }} does not match 'dynweb', 'dwb', or 'web'"
  when: not install_myecs_cert | bool

###################################
# CERTIFICATE TASKS END
