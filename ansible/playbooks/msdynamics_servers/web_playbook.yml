# CREATE DIR FOR LOGS
- name: Ensure IIS log directory exists
  ansible.windows.win_file:
    path: "D:\\inetpub\\logs\\LogFiles"
    state: directory

# MOVE IIS LOGS TO D DRIVE
- name: Move IIS logs to D drive
  ansible.windows.win_shell: |
    Import-Module WebAdministration
    Get-Website | ForEach-Object {
        Set-ItemProperty "IIS:\\Sites\\$($_.Name)" -Name logfile.directory -Value "D:\\inetpub\\logs\\LogFiles"
    }

# REMOVE DEFAULT IIS WEBSITE
- name: Remove Default Web Site via PowerShell
  ansible.windows.win_powershell:
    script: |
      Import-Module WebAdministration
      if (Test-Path "IIS:\Sites\Default Web Site") {
          Remove-Website -Name "Default Web Site"
      }

